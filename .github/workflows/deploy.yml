# 推送到 main 分支时自动构建并发布到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs and theme
        run: pip install mkdocs-material

      - name: Copy night-bg asset (if exists)
        run: |
          mkdir -p docs/assets/images
          [ -f night-bg-source/night-bg.apng ] && cp night-bg-source/night-bg.apng docs/assets/images/ || true
          [ -f docs/assets/images/night-bg.png ] && true || true

      - name: Build site
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
